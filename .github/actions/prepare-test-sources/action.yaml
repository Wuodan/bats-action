name: Prepare test sources
description: Cache and fetch upstream library source trees used by bats-action test workflows.

inputs:
  github-token:
    description: GitHub token used for authenticated API requests
    required: false
    default: ""
  source-root:
    description: Directory where the source trees are cached and restored
    required: false
    default: ${{ github.workspace }}/.bats-test-sources

outputs:
  source-root:
    description: Directory containing the cached upstream source trees
    value: ${{ inputs.source-root }}

runs:
  using: composite
  steps:
    - name: Prepare Bats-support test source
      uses: ./.github/actions/prepare-test-source
      with:
        github-token: ${{ inputs.github-token }}
        source-root: ${{ inputs.source-root }}
        library: support

    - name: Prepare Bats-assert test source
      uses: ./.github/actions/prepare-test-source
      with:
        github-token: ${{ inputs.github-token }}
        source-root: ${{ inputs.source-root }}
        library: assert

    - name: Prepare Bats-detik test source
      uses: ./.github/actions/prepare-test-source
      with:
        github-token: ${{ inputs.github-token }}
        source-root: ${{ inputs.source-root }}
        library: detik

    - name: Prepare Bats-file test source
      uses: ./.github/actions/prepare-test-source
      with:
        github-token: ${{ inputs.github-token }}
        source-root: ${{ inputs.source-root }}
        library: file
